async function fetchJson(url) {
  async function tryUrl(u) {
    const r = await fetch(u, { signal: AbortSignal.timeout(15000) });
    if (!r.ok) throw new Error(r.status);
    const text = await r.text();
    // allorigins /get wraps response in {"contents":"..."}
    if (text.trimStart().startsWith('{') && text.includes('"contents"')) {
      const d = JSON.parse(text);
      if (d.contents) return JSON.parse(d.contents);
    }
    return JSON.parse(text);
  }
  const enc = encodeURIComponent(url);
  const urls = [
    url,
    `https://corsproxy.io/?${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://api.codetabs.com/v1/proxy?quest=${enc}`,
  ];
  for (const u of urls) {
    try { return await tryUrl(u); } catch {}
  }
  throw new Error('chapters fetch failed');
}

// Parse ID3v2 CHAP frames embedded in an MP3 file
async function loadChaptersFromId3(audioUrl) {
  if (!audioUrl) return null;
  const MAX_ID3_BYTES = 3 * 1024 * 1024;

  function id3TagEnd(buf) {
    if (buf.length < 10) return 0;
    if (buf[0] !== 0x49 || buf[1] !== 0x44 || buf[2] !== 0x33) return 0;
    return 10 + (((buf[6]&0x7f)<<21)|((buf[7]&0x7f)<<14)|((buf[8]&0x7f)<<7)|(buf[9]&0x7f));
  }

  function mergeChunks(chunks, total) {
    const buf = new Uint8Array(total);
    let off = 0;
    for (const c of chunks) { buf.set(c, off); off += c.length; }
    return buf;
  }

  function chapterAudioUrls(url) {
    const urls = [url];
    try {
      const u = new URL(url);
      const libsynMatch = url.match(/(?:https?:\/\/)?traffic\.libsyn\.com\/(.+\.mp3)(?:[?#].*)?$/i)
        || url.match(/traffic\.libsyn\.com\/(.+\.mp3)(?:[?#].*)?$/i);
      if (libsynMatch) {
        urls.push(`https://pscrb.fm/rss/p/traffic.libsyn.com/${libsynMatch[1]}`);
        urls.push(`https://traffic.libsyn.com/${libsynMatch[1]}`);
      }
      const atpMatch = u.hostname === 'atp.fm' && u.pathname.match(/^\/audio\/[^/]+\/([^/]+\.mp3)$/i);
      if (atpMatch) {
        urls.push(`https://pscrb.fm/rss/p/traffic.libsyn.com/atpfm/${atpMatch[1]}`);
        urls.push(`https://traffic.libsyn.com/atpfm/${atpMatch[1]}`);
      }
    } catch {}
    return [...new Set(urls)];
  }

  // Read enough of the ID3 tag to include chapter frames. Some feeds put large
  // chapter artwork before later CHAP frames, so 64 KB is not enough.
  async function readHead(response) {
    if (!response.body) throw new Error('stream unavailable');
    const reader = response.body.getReader();
    const chunks = [];
    let total = 0;
    let need = 65536;
    while (total < need && total < MAX_ID3_BYTES) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      total += value.length;
      const buf = mergeChunks(chunks, total);
      const tagEnd = id3TagEnd(buf);
      if (tagEnd) need = Math.min(tagEnd, MAX_ID3_BYTES);
      else if (total >= 10) break;
    }
    reader.cancel().catch(() => {});
    return mergeChunks(chunks, total);
  }

  let buf;
  for (const url of chapterAudioUrls(audioUrl)) {
    try {
      // Attempt 1: plain GET. We cancel after the ID3 tag, so this does not
      // download the whole MP3 on streaming-capable browsers.
      const r = await fetch(url, { signal: AbortSignal.timeout(25000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      buf = await readHead(r);
      break;
    } catch {
      try {
        // Attempt 2: bounded range request. This also helps Safari when fetch
        // streams are unavailable and handles large ID3 tags from Relay/ATP.
        const r = await fetch(url, { headers: { Range: `bytes=0-${MAX_ID3_BYTES - 1}` }, signal: AbortSignal.timeout(25000) });
        if (!r.ok && r.status !== 206) throw new Error(`HTTP ${r.status}`);
        buf = new Uint8Array(await r.arrayBuffer());
        break;
      } catch(e) {
        console.warn('[chapters] ID3 fetch failed', url, e);
      }
    }
  }
  if (!buf) return null;

  try {
    // Verify ID3 magic
    if (buf[0] !== 0x49 || buf[1] !== 0x44 || buf[2] !== 0x33) return null;
    const ver = buf[3]; // 2=v2.2, 3=v2.3, 4=v2.4
    const tagEnd = 10 + (((buf[6]&0x7f)<<21)|((buf[7]&0x7f)<<14)|((buf[8]&0x7f)<<7)|(buf[9]&0x7f));
    const idLen = ver <= 2 ? 3 : 4;
    const hdrLen = ver <= 2 ? 6 : 10;

    function frameSize(i) {
      if (ver <= 2) return (buf[i]<<16)|(buf[i+1]<<8)|buf[i+2];
      if (ver === 4) return ((buf[i]&0x7f)<<21)|((buf[i+1]&0x7f)<<14)|((buf[i+2]&0x7f)<<7)|(buf[i+3]&0x7f);
      return (((buf[i]<<24)|(buf[i+1]<<16)|(buf[i+2]<<8)|buf[i+3])>>>0);
    }
    function decodeStr(start, len) {
      if (start >= buf.length || len <= 0) return '';
      const enc = buf[start];
      const raw = buf.slice(start + 1, start + len);
      if (enc === 1) {
        // UTF-16 with BOM
        const be = raw[0] === 0xFE && raw[1] === 0xFF;
        return new TextDecoder(be ? 'utf-16be' : 'utf-16le').decode(raw.slice(2)).replace(/\0/g,'');
      }
      if (enc === 2) return new TextDecoder('utf-16be').decode(raw).replace(/\0/g,'');
      if (enc === 3) return new TextDecoder('utf-8').decode(raw).replace(/\0/g,'');
      return Array.from(raw).map(b => String.fromCharCode(b)).join('').replace(/\0/g,'');
    }

    const chapters = [];
    let pos = 10;
    while (pos + hdrLen <= Math.min(tagEnd, buf.length)) {
      if (buf[pos] === 0) break;
      const fid = String.fromCharCode(...buf.slice(pos, pos + idLen));
      const fsz = frameSize(pos + idLen);
      if (fsz <= 0 || pos + hdrLen + fsz > Math.min(tagEnd, buf.length)) break;
      const fdata = pos + hdrLen;

      if (fid === 'CHAP') {
        // Element ID (null-terminated)
        let e = fdata;
        while (e < buf.length && buf[e] !== 0) e++;
        const t = e + 1;
        if (t + 16 > buf.length) { pos += hdrLen + fsz; continue; }
        const startMs = (((buf[t]<<24)|(buf[t+1]<<16)|(buf[t+2]<<8)|buf[t+3])>>>0);
        const endMs   = (((buf[t+4]<<24)|(buf[t+5]<<16)|(buf[t+6]<<8)|buf[t+7])>>>0);

        let title = '', url = '';
        let sub = t + 16;
        const subEnd = fdata + fsz;
        while (sub + hdrLen <= Math.min(subEnd, buf.length)) {
          if (buf[sub] === 0) break;
          const sid = String.fromCharCode(...buf.slice(sub, sub + idLen));
          const ssz = frameSize(sub + idLen);
          if (ssz <= 0) break;
          if (sub + hdrLen + ssz > Math.min(subEnd, buf.length)) break;
          if (sid === 'TIT2') title = decodeStr(sub + hdrLen, ssz);
          if (sid === 'WXXX' || sid === 'WXX') {
            // Skip encoding byte + description, then URL
            let descEnd = sub + hdrLen + 1;
            while (descEnd < buf.length && buf[descEnd] !== 0) descEnd++;
            url = new TextDecoder('utf-8').decode(buf.slice(descEnd + 1, sub + hdrLen + ssz));
          }
          sub += hdrLen + ssz;
        }
        chapters.push({
          startTime: startMs / 1000,
          endTime: endMs === 0xFFFFFFFF ? undefined : endMs / 1000,
          title,
          url: url || undefined,
        });
      }
      pos += hdrLen + fsz;
    }
    return chapters.length > 0 ? chapters.sort((a,b) => a.startTime - b.startTime) : null;
  } catch(e) {
    console.warn('[chapters] ID3 parse error', e);
    return null;
  }
}

async function loadChapters(ep) {
  const chDiv = document.getElementById('fp-chapters');
  const dot0 = document.getElementById('art-dot-0');

  // ?? not || : '' means "fetched, no chapters"; undefined means "never fetched"
  let resolvedUrl = ep?.chaptersUrl ?? (getEps(ep?.podId || 0)).find(e => e.id === ep?.id)?.chaptersUrl;

  // If never fetched, try a lazy feed refresh for subscribed podcasts (once — chaptersLoading guards recursion)
  if (resolvedUrl === undefined && ep?.podId && !chaptersLoading) {
    const sub = S.subs.find(s => s.id === ep.podId);
    if (sub?.feedUrl) {
      chaptersLoading = true;
      chDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 4px">Loading chapters…</div>';
      dot0.style.display = '';
      try { await fetchFeed(ep.podId, sub.feedUrl, sub, true); } catch(e) { console.warn('[chapters] fetchFeed error', e); }
      chaptersLoading = false;
      // If fetchFeed's re-trigger already loaded chapters (external call path), we're done
      if (chaptersEpId === ep.id) return;
      // Otherwise read chaptersUrl from the freshly saved library
      resolvedUrl = (getEps(ep.podId)).find(e => e.id === ep.id)?.chaptersUrl ?? '';
    } else {
      resolvedUrl = '';
    }
  } else if (resolvedUrl === undefined) {
    resolvedUrl = '';
  }

  // No RSS chapters URL — try ID3 CHAP frames embedded in the MP3 as a fallback
  if (!resolvedUrl) {
    // Skip if already tried for this episode
    if (chaptersEpId === ep.id) return;
    if (ep?.audioUrl) {
      chDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 4px">Loading chapters…</div>';
      dot0.style.display = '';
      const id3Chs = await loadChaptersFromId3(ep.audioUrl);
      if (id3Chs) {
        currentChapters = id3Chs;
        chaptersEpId = ep.id;
        lastHighlightedChapter = -1;
        dot0.style.display = '';
        renderChapters();
        updateCarouselBtns();
        return;
      }
    }
    currentChapters = []; chaptersEpId = ep.id; lastHighlightedChapter = -1;
    dot0.style.display = 'none';
    chDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 4px">No chapters for this episode.</div>';
    updateCarouselBtns();
    return;
  }

  // Already loaded for this episode
  if (chaptersEpId === ep.id) return;

  currentChapters = []; chaptersEpId = ep.id; lastHighlightedChapter = -1;
  dot0.style.display = '';
  chDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 4px">Loading chapters…</div>';
  try {
    const json = await fetchJson(resolvedUrl);
    currentChapters = (json.chapters || []).filter(c => typeof c.startTime === 'number');
    renderChapters();
    updateCarouselBtns();
  } catch(e) {
    console.warn('[chapters] fetchJson failed', e);
    chDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 4px">Couldn\'t load chapters.</div>';
  }
}

function renderChapters() {
  const chDiv = document.getElementById('fp-chapters');
  if (!currentChapters.length) {
    chDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 4px">No chapters available.</div>';
    return;
  }
  const epDur = S.queue[S.qi]?.dur || audio.duration || 0;
  chDiv.innerHTML = currentChapters.map((ch, i) => {
    const next = currentChapters[i + 1];
    const end = ch.endTime ?? next?.startTime ?? (i === currentChapters.length - 1 ? epDur : null);
    const durSec = end != null ? Math.max(0, end - ch.startTime) : null;
    const durLabel = durSec != null ? (durSec >= 60 ? `${Math.round(durSec/60)}m` : `${Math.round(durSec)}s`) : '';
    const href = safeHttpUrl(ch.url);
    const linkBtn = href ? `<a class="ch-link" href="${esc(href)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">›</a>` : '';
    return `<div class="ch-item" id="ch-${i}" onclick="seekToChapter(${ch.startTime})">
      <div class="ch-body">
        <div class="ch-title">${esc(ch.title || `Chapter ${i+1}`)}</div>
        <div class="ch-meta">${ft(ch.startTime)}${durLabel ? ' · ' + durLabel : ''}</div>
      </div>
      ${linkBtn}
    </div>`;
  }).join('');
  updateChapterHighlight();
}

function updateChapterHighlight() {
  if (!currentChapters.length) return;
  const t = audio.currentTime;
  let cur = 0;
  for (let i = 0; i < currentChapters.length; i++) {
    if (currentChapters[i].startTime <= t) cur = i; else break;
  }
  if (cur === lastHighlightedChapter) return;
  lastHighlightedChapter = cur;
  currentChapters.forEach((_, i) => {
    const el = document.getElementById(`ch-${i}`);
    if (!el) return;
    el.classList.toggle('ch-current', i === cur);
    el.classList.toggle('ch-past', i < cur);
  });
}

function seekToChapter(startTime) {
  audio.currentTime = startTime;
  S.pos = startTime;
  updateProgress();
}

// Chapters ↔ Art ↔ Notes swipe carousel
let artSwipe = null, carouselPanel = 1; // 0=chapters, 1=artwork, 2=notes
const artSlider = document.getElementById('art-slider');
const artWrap = artSlider.parentElement;

function setCarouselPanel(index, animate = true) {
  const W = artWrap.offsetWidth;
  artSlider.style.transition = animate ? 'transform 0.35s cubic-bezier(0.32,0.72,0,1)' : 'none';
  artSlider.style.transform = `translateX(${-index * W}px)`;
  carouselPanel = index;
  document.getElementById('art-dot-0').classList.toggle('on', index === 0);
  document.getElementById('art-dot-1').classList.toggle('on', index === 1);
  document.getElementById('art-dot-2').classList.toggle('on', index === 2);
  updateCarouselBtns();
}

artWrap.addEventListener('touchstart', e => {
  const W = artWrap.offsetWidth;
  const onScrollPanel = (carouselPanel === 2 && !!e.target.closest('#fp-notes')) ||
                        (carouselPanel === 0 && !!e.target.closest('#fp-chapters'));
  artSwipe = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, active: false, mode: null, onScrollPanel };
  artSlider.style.transition = 'none';
  artSlider.style.transform = `translateX(${-carouselPanel * W}px)`;
  if (!onScrollPanel) fullPlayer.style.transition = 'none';
}, { passive: true });

artWrap.addEventListener('touchmove', e => {
  if (!artSwipe) return;
  const dx = e.touches[0].clientX - artSwipe.startX;
  const dy = e.touches[0].clientY - artSwipe.startY;
  if (!artSwipe.active) {
    if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
    if (artSwipe.onScrollPanel) {
      const towardArt = (carouselPanel === 2 && dx > 0) || (carouselPanel === 0 && dx < 0);
      if (Math.abs(dx) > Math.abs(dy) && towardArt) {
        artSwipe.active = true; artSwipe.mode = 'carousel';
      } else {
        artSwipe = null; return;
      }
    } else {
      if (!isDesktop() && dy > 0 && dy > Math.abs(dx) * 1.2) {
        artSwipe.active = true; artSwipe.mode = 'dismiss';
      } else if (Math.abs(dx) > Math.abs(dy) * 0.8) {
        artSwipe.active = true; artSwipe.mode = 'carousel';
      } else {
        artSwipe = null; fullPlayer.style.transition = ''; return;
      }
    }
  }
  if (artSwipe.mode === 'dismiss') {
    fullPlayer.style.transform = `translateY(${Math.max(0, dy)}px)`;
  } else {
    const W = artWrap.offsetWidth;
    const base = -carouselPanel * W;
    const minX = -(2 * W);
    const maxX = currentChapters.length ? 0 : -W;
    artSlider.style.transform = `translateX(${Math.max(minX, Math.min(maxX, base + dx))}px)`;
  }
}, { passive: true });

artWrap.addEventListener('touchend', e => {
  if (!artSwipe?.active) {
    artSwipe = null;
    fullPlayer.style.transition = '';
    fullPlayer.style.transform = '';
    setCarouselPanel(carouselPanel, false);
    return;
  }
  if (artSwipe.mode === 'dismiss') {
    const dy = e.changedTouches[0].clientY - artSwipe.startY;
    artSwipe = null;
    fullPlayer.style.transition = '';
    fullPlayer.style.transform = '';
    if (dy > 80) closePlayer();
  } else {
    const dx = e.changedTouches[0].clientX - artSwipe.startX;
    artSwipe = null;
    fullPlayer.style.transition = '';
    fullPlayer.style.transform = '';
    const threshold = artWrap.offsetWidth * 0.25;
    const canLeft = carouselPanel < 2;
    const canRight = carouselPanel > 0;
    if (dx < -threshold && canLeft) setCarouselPanel(carouselPanel + 1);
    else if (dx > threshold && canRight) setCarouselPanel(carouselPanel - 1);
    else setCarouselPanel(carouselPanel);
  }
}, { passive: true });

// Clickable carousel dots
document.getElementById('art-dot-0').addEventListener('click', () => setCarouselPanel(0));
document.getElementById('art-dot-1').addEventListener('click', () => setCarouselPanel(1));
document.getElementById('art-dot-2').addEventListener('click', () => setCarouselPanel(2));

// Carousel prev/next buttons (desktop)
function updateCarouselBtns() {
  const prev = document.getElementById('carousel-prev');
  const next = document.getElementById('carousel-next');
  if (!prev) return;
  prev.disabled = carouselPanel === 0;
  next.disabled = carouselPanel === 2;
}
document.getElementById('carousel-prev').addEventListener('click', () => {
  if (carouselPanel > 0) setCarouselPanel(carouselPanel - 1);
});
document.getElementById('carousel-next').addEventListener('click', () => {
  if (carouselPanel < 2) setCarouselPanel(carouselPanel + 1);
});

// Scrubbing requires deliberate horizontal intent — vertical swipes pass through
progTrack.addEventListener('touchstart', e => {
  scrubOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

progTrack.addEventListener('touchmove', e => {
  if (!scrubOrigin) return;
  const dx = Math.abs(e.touches[0].clientX - scrubOrigin.x);
  const dy = Math.abs(e.touches[0].clientY - scrubOrigin.y);
  if (!scrubbing) {
    if (dx > 6 && dx > dy * 1.5) scrubbing = true;   // clearly horizontal — scrub
    else if (dy > 6 && dy > dx * 1.5) { scrubOrigin = null; return; } // clearly vertical — ignore
  }
  if (scrubbing) scrubTo(e.touches[0].clientX);
}, { passive: true });

progTrack.addEventListener('touchend', e => {
  if (scrubOrigin && !scrubbing) scrubTo(e.changedTouches[0].clientX); // tap = seek
  scrubbing = false;
  scrubOrigin = null;
});

// Mini player — tap the body to open the full player (buttons keep their own handlers)
const miniEl = document.getElementById('mini-player');
miniEl.addEventListener('click', e => {
  if (e.target.closest('button')) return;
  openPlayer();
});
document.getElementById('fp-pp').addEventListener('click', togglePlay);
document.getElementById('fp-prev').addEventListener('click', prevTrack);
document.getElementById('fp-next').addEventListener('click', nextTrack);
document.getElementById('fp-back30').addEventListener('click', () => audio.currentTime = Math.max(0, audio.currentTime - 30));
document.getElementById('fp-fwd30').addEventListener('click', () => audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 30));
document.getElementById('mini-pp-btn').addEventListener('click', togglePlay);
document.getElementById('mini-back13').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 13); });
document.getElementById('mini-fwd13').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 13); });

document.querySelectorAll('.spd-btn').forEach(b => {
  b.addEventListener('click', () => setSpeed(parseFloat(b.dataset.s)));
});

// ── Waypoints ─────────────────────────────────────────────────────────────────
document.getElementById('fp-mark-wp').addEventListener('click', () => {
  const ep = S.queue[S.qi];
  if (!ep) { toast('Nothing playing'); return; }
  S.waypoints.push({
    id: Date.now(),
    label: ep.title.slice(0,50),
    epId: ep.id,
    pos: audio.currentTime,
    epTitle: ep.title,
    showName: ep.podName,
    ts: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
  });
  save();
  toast('Waypoint saved ⚑');
});

// ── Sleep timer ───────────────────────────────────────────────────────────────
const SLEEP_OPTS = [15, 30, 45, 60]; // minutes
let sleepTimer = null, sleepEnd = null, sleepTick = null;

function cycleSleep() {
  if (!sleepEnd) {
    // First tap: start at 15 min and save a waypoint
    const ep = S.queue[S.qi];
    if (ep) {
      S.waypoints.unshift({
        id: Date.now(),
        label: '⏾ Sleep timer — ' + ep.title.slice(0, 40),
        epId: ep.id,
        pos: audio.currentTime,
        epTitle: ep.title,
        showName: ep.podName,
        ts: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
      });
      save();
    }
    setSleep(15);
  } else {
    const remMin = Math.ceil((sleepEnd - Date.now()) / 60000);
    const cur = SLEEP_OPTS.findIndex(m => m >= remMin);
    if (cur < SLEEP_OPTS.length - 1) {
      setSleep(SLEEP_OPTS[cur + 1]);
    } else {
      cancelSleep();
      toast('Sleep timer off');
    }
  }
}

function setSleep(min) {
  clearTimeout(sleepTimer);
  clearInterval(sleepTick);
  sleepEnd = Date.now() + min * 60000;
  sleepTimer = setTimeout(() => { audio.pause(); cancelSleep(); toast('Sleep timer ended ⏾'); }, min * 60000);
  sleepTick = setInterval(updateSleepBtn, 1000);
  updateSleepBtn();
  toast(`Sleep timer: ${min} min ⏾`);
}

function cancelSleep() {
  clearTimeout(sleepTimer);
  clearInterval(sleepTick);
  sleepTimer = sleepEnd = sleepTick = null;
  updateSleepBtn();
}

function updateSleepBtn() {
  const btn = document.getElementById('fp-sleep-btn');
  if (!btn) return;
  if (sleepEnd) {
    const rem = Math.max(0, sleepEnd - Date.now());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    btn.textContent = `⏾ ${m}:${String(s).padStart(2,'0')}`;
    btn.classList.add('sleep-on');
  } else {
    btn.textContent = '⏾ Sleep';
    btn.classList.remove('sleep-on');
  }
}

document.getElementById('fp-sleep-btn').addEventListener('click', cycleSleep);

function jumpToWaypoint(id) {
  const wp = S.waypoints.find(w => w.id === id);
  if (!wp) return;
  const qIdx = S.queue.findIndex(e => e.id === wp.epId);
  if (qIdx === -1) { toast('Episode no longer in queue'); return; }
  S.qi = qIdx;
  S.pos = wp.pos;
  loadTrack(true);
  save();
  openPlayer();
}

function delWaypoint(ev, id) {
  ev.stopPropagation();
  S.waypoints = S.waypoints.filter(w => w.id !== id);
  save();
  renderWaypoints();
}

function clearAllWaypoints() {
  S.waypoints = [];
  save();
  renderWaypoints();
}

function renderWaypoints() {
  const el = document.getElementById('wp-list');
  const clearBtn = document.getElementById('wp-clear-btn');
  if (!S.waypoints.length) {
    el.innerHTML = '<div class="empty"><div class="ico">⚑</div><p>No waypoints yet.<br>Tap ⚑ in the player to mark a moment.</p></div>';
    if (clearBtn) clearBtn.style.display = 'none';
    return;
  }
  if (clearBtn) clearBtn.style.display = '';
  el.innerHTML = S.waypoints.map(wp => `
    <div class="wp-item" onclick="jumpToWaypoint(${wp.id})">
      <div class="wp-icon">⚑</div>
      <div class="wp-info">
        <div class="wp-label">${esc(wp.label)}</div>
        <div class="wp-detail">${esc(wp.epTitle)} · ${ft(wp.pos)} · ${esc(wp.ts)}</div>
      </div>
      <button class="wp-del" onclick="delWaypoint(event,${wp.id})">×</button>
    </div>`).join('');
}

// ── Keyboard shortcuts (desktop) ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea, select')) return;
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 30); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 30); }
});

// ── Restore on load ───────────────────────────────────────────────────────────
(function init() {
  audio.playbackRate = S.speed;
  document.querySelectorAll('.spd-btn').forEach(b => b.classList.toggle('on', parseFloat(b.dataset.s) === S.speed));
  setCarouselPanel(1, false);
  renderLibrary();
  updateMini();
  if (S.queue[S.qi]) {
    const ep = S.queue[S.qi];
    document.getElementById('fp-art').src = ep.art || '';
    document.getElementById('fp-title').textContent = ep.title;
    document.getElementById('fp-show').textContent = ep.podName;
    const pct = ep.dur ? S.pos / ep.dur * 100 : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-thumb').style.left = pct + '%';
    document.getElementById('mini-prog-fill').style.width = pct + '%';
    document.getElementById('t-cur').textContent = ft(S.pos);
    document.getElementById('t-rem').textContent = ep.dur ? '-'+ft(ep.dur - S.pos) : '-0:00';
    if (isDesktop()) loadChapters(ep);
  }
})();
</script>
