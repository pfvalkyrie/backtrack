<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Backtrack</title>
<style>
:root {
  --orange: #FF6600;
  --orange-dim: #CC5200;
  --orange-end: #FF3D7F;
  --gradient: linear-gradient(135deg, #FF6600, #FF3D7F);
  --bg: #000;
  --s1: #111111;
  --s2: #1a1a1a;
  --s3: #242424;
  --text: #ffffff;
  --dim: #888888;
  --muted: #444444;
  --border: #2a2a2a;
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}

/* Header */
.vhead{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;flex-shrink:0}
.vhead h1{font-size:26px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.vhead h2{font-size:20px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.back-btn{background:none;border:none;color:var(--orange);font-size:28px;line-height:1;padding:0 4px 0 0;cursor:pointer;flex-shrink:0}

/* Search */
.search-row{display:flex;gap:8px;padding:0 16px 12px;flex-shrink:0}
.search-row input{flex:1;background:var(--s2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-size:16px;padding:13px 16px;outline:none;-webkit-appearance:none}
.search-row input:focus{border-color:var(--orange)}
.search-row input::placeholder{color:var(--muted)}
.search-row button{background:var(--gradient);border:none;border-radius:13px;color:#000;font-size:15px;font-weight:700;padding:0 18px;cursor:pointer;flex-shrink:0}

/* Cards */
.pod-card{display:flex;align-items:flex-start;gap:12px;background:var(--s1);border-radius:20px;padding:14px;margin-bottom:10px}
.pod-art{width:72px;height:72px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--s3)}
.pod-info{flex:1;min-width:0}
.pod-name{font-size:14px;font-weight:700;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pod-desc{font-size:12px;color:var(--dim);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.sub-btn{margin-top:8px;background:var(--gradient);border:none;border-radius:20px;color:#000;font-size:12px;font-weight:800;padding:6px 14px;cursor:pointer;letter-spacing:0.2px}
.sub-btn.done{background:var(--s3);color:var(--dim);border:1px solid var(--border)}

/* Library */
.lib-card{display:flex;align-items:center;gap:12px;background:var(--s1);border-radius:20px;padding:14px;margin-bottom:10px;cursor:pointer}
.lib-card:active{opacity:0.6}
.lib-art{width:62px;height:62px;border-radius:14px;object-fit:cover;background:var(--s3);flex-shrink:0}
.lib-info{flex:1;min-width:0}
.lib-name{font-size:14px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.lib-eps{font-size:12px;color:var(--dim);margin-top:3px}
.lib-chevron{color:var(--muted);font-size:20px;flex-shrink:0}

/* Episodes */
.ep-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ep-item:active{opacity:0.6}
.ep-listened{color:var(--orange-dim);font-size:11px}
.ep-art{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--s3);flex-shrink:0}
.ep-info{flex:1;min-width:0}
.ep-title{font-size:14px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.ep-meta{font-size:11px;color:var(--dim);margin-top:3px}
.add-btn{width:40px;height:40px;border-radius:10px;background:var(--s3);border:1px solid var(--border);color:var(--orange);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1}
.add-btn:active{background:var(--s2)}
.add-btn.in-queue{background:var(--gradient);color:#000;border-color:var(--orange);font-size:16px}

/* Queue */
.q-item{display:flex;align-items:center;gap:10px;background:var(--s1);border-radius:18px;padding:12px;margin-bottom:8px;cursor:pointer}
.q-item:active{opacity:0.7}
.q-item.now{background:var(--s2);border:1.5px solid var(--orange)}
.q-num{width:22px;text-align:center;font-size:12px;color:var(--muted);flex-shrink:0;font-weight:600}
.q-item.now .q-num{color:var(--orange)}
.q-art{width:46px;height:46px;border-radius:12px;object-fit:cover;background:var(--s3);flex-shrink:0}
.q-info{flex:1;min-width:0}
.q-title{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.q-show{font-size:11px;color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px}
.q-del{background:none;border:none;color:var(--muted);font-size:22px;padding:4px 6px;cursor:pointer;flex-shrink:0;line-height:1}
.q-del:active{color:var(--text)}
.q-drag{background:none;border:none;color:var(--muted);font-size:20px;padding:4px 4px;flex-shrink:0;touch-action:none;line-height:1;cursor:grab}
.vhead-action{background:none;border:none;color:var(--orange);font-size:15px;font-weight:600;padding:4px 8px;cursor:pointer;margin-left:auto;flex-shrink:0}
.q-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent}
.q-item.q-sel .q-check{border-color:var(--orange);background:var(--gradient);color:#000}
#queue-edit-bar{display:none;gap:10px;padding:10px 16px 10px;flex-shrink:0}
#queue-edit-bar.visible{display:flex}
.qeb-btn{flex:1;padding:12px 8px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.qeb-remove{background:var(--gradient);color:#000}
.qeb-remove:disabled{opacity:0.35}
.qeb-clear{background:var(--s2);color:var(--text)}

/* Waypoints */
.wp-item{display:flex;align-items:center;gap:12px;background:var(--s1);border-radius:18px;padding:14px;margin-bottom:10px;cursor:pointer}
.wp-item:active{opacity:0.7}
.wp-icon{font-size:22px;flex-shrink:0;width:28px;text-align:center}
.wp-info{flex:1;min-width:0}
.wp-label{font-size:14px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wp-detail{font-size:11px;color:var(--dim);margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wp-del{background:none;border:none;color:var(--muted);font-size:22px;padding:4px 6px;cursor:pointer;flex-shrink:0;line-height:1}

/* Mini player */
#mini-player{background:var(--s1);margin:8px 10px 0;border-radius:18px;padding:10px 12px 13px;flex-shrink:0;display:none;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,0.5);position:relative;overflow:hidden;-webkit-transform:translateZ(0);transform:translateZ(0)}
#mini-player.on{display:block}
#mini-prog-track{position:absolute;bottom:0;left:0;right:0;height:3px;background:#333}
#mini-prog-fill{height:100%;background:var(--gradient);width:0%}
.mini-inner{display:flex;align-items:center;gap:12px}
#mini-art{width:46px;height:46px;border-radius:12px;object-fit:cover;background:var(--s3);flex-shrink:0}
.mini-txt{flex:1;min-width:0}
#mini-title{font-size:13px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#mini-show{font-size:11px;color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.mini-btns{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mini-btn{background:none;border:none;color:var(--text);padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mini-btn.pp{color:var(--orange)}
.mini-btn svg{display:block}

/* Tab bar */
#tab-bar{display:flex;background:var(--s1);padding-bottom:max(calc(env(safe-area-inset-bottom,0px) + 12px),34px);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:0.2px}
.tab svg{width:22px;height:22px}
.tab.on{color:var(--orange)}

/* Full player */
#full-player{display:flex;position:fixed;inset:0;background:#111;z-index:200;flex-direction:column;padding-top:calc(env(safe-area-inset-top,0px) + 8px);overflow:hidden;transform:translateY(100%);transition:transform 0.44s cubic-bezier(0.32,0.72,0,1);will-change:transform;border-radius:24px 24px 0 0}
#full-player.on{transform:translateY(0)}
#fp-inner{flex:1 1 0;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 24px;padding-bottom:calc(env(safe-area-inset-bottom,16px) + 20px)}
.fp-topbar{display:flex;align-items:center;justify-content:center;position:relative;margin:0 24px 20px;flex-shrink:0;height:24px}
.drag-handle{width:40px;height:5px;background:var(--border);border-radius:3px;cursor:pointer}
.fp-queue-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);padding:6px;cursor:pointer;display:flex;align-items:center}
.fp-queue-btn:active{color:var(--orange)}
/* Art / notes / chapters carousel */
.art-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;flex-shrink:0}
.carousel-btn{display:none;background:none;border:none;color:var(--muted);font-size:30px;cursor:pointer;padding:4px 6px;border-radius:12px;flex-shrink:0;line-height:1;transition:color 0.15s}
.carousel-btn:disabled{opacity:0.2;cursor:default}
.art-wrap{width:min(220px,56vw);height:min(220px,56vw);overflow:hidden;border-radius:20px;flex-shrink:0;position:relative}
.art-slider{display:flex;width:300%;height:100%;will-change:transform;transform:translateX(-33.333%)}
#fp-chapters{width:33.333%;height:100%;background:var(--s2);border-radius:20px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:10px 12px;box-sizing:border-box;flex-shrink:0}
#fp-art{width:33.333%;height:100%;border-radius:20px;object-fit:cover;background:var(--s3);flex-shrink:0;user-select:none;-webkit-user-drag:none;touch-action:none;display:block}
#fp-notes{width:33.333%;height:100%;background:var(--s2);border-radius:20px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:14px;box-sizing:border-box;font-size:13px;color:var(--text);line-height:1.6;flex-shrink:0;word-break:break-word;overflow-wrap:break-word}
.art-dots{display:flex;gap:7px;justify-content:center;margin-bottom:10px;flex-shrink:0}
.art-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background 0.2s,transform 0.2s}
.art-dot.on{background:var(--orange);transform:scale(1.25)}
.ch-item{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid var(--border);cursor:pointer}
.ch-item:last-child{border-bottom:none}
.ch-body{flex:1;min-width:0}
.ch-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-meta{font-size:11px;color:var(--dim);margin-top:2px;font-variant-numeric:tabular-nums}
.ch-link{font-size:16px;color:var(--dim);flex-shrink:0;text-decoration:none;padding:0 2px}
.ch-current .ch-title{color:var(--orange)}
.ch-current .ch-meta{color:var(--orange)}
.ch-past .ch-title{color:var(--muted)}
.ch-past .ch-meta{color:var(--muted)}
#fp-title{font-size:18px;font-weight:800;text-align:center;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;letter-spacing:-0.3px;cursor:pointer}
#fp-title:active{opacity:0.6}
#fp-show{font-size:13px;color:var(--dim);text-align:center;margin-bottom:22px;cursor:pointer}
#fp-show:active{opacity:0.6}

/* Progress */
.prog-wrap{margin-bottom:16px;flex-shrink:0}
#prog-track{width:100%;height:6px;background:var(--s3);border-radius:4px;position:relative;cursor:pointer;touch-action:none;padding:6px 0;margin:-6px 0;box-sizing:content-box}
#prog-fill{height:6px;background:var(--gradient);border-radius:4px;width:0%;pointer-events:none;position:relative;top:0}
#prog-thumb{width:16px;height:16px;border-radius:50%;background:var(--orange);position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 3px rgba(255,102,0,0.3)}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:6px}

/* Speed */
.speed-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-shrink:0}
.spd-btn{background:var(--s2);border:none;border-radius:20px;color:var(--dim);font-size:13px;font-weight:700;padding:11px 15px;cursor:pointer}
.spd-btn.on{background:var(--gradient);color:#000}

/* Controls */
.main-ctrl{display:flex;align-items:center;justify-content:space-around;margin-bottom:20px;flex-shrink:0}
.c-btn{background:none;border:none;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px}
.c-btn svg{display:block}
.c-btn span{font-size:9px;color:var(--muted);font-weight:600}
.c-btn:active{opacity:0.6}
.c-play{width:76px;height:76px;border-radius:50%;background:var(--gradient);border:none;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-play:active{opacity:0.8}
.skip-btn{background:var(--s2);border:1.5px solid var(--border);border-radius:14px;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 20px}
.skip-btn svg{display:block}
.skip-btn span{font-size:10px;color:var(--dim);font-weight:700}
.skip-btn:active{background:var(--s3)}

/* Waypoint btns */
.wp-row{display:flex;gap:10px;justify-content:center;flex-shrink:0}
.wp-action{flex:1;max-width:220px;background:var(--s2);border:none;border-radius:16px;color:var(--orange);font-size:14px;font-weight:700;padding:18px 10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.wp-action:active{opacity:0.7}
.wp-action.sleep-on{background:var(--gradient);color:#000}

/* Empty + loading */
.empty{text-align:center;padding:52px 24px;color:var(--dim)}
.empty .ico{font-size:44px;margin-bottom:12px}
.empty p{font-size:15px;line-height:1.4}
.loading-msg{text-align:center;padding:32px;color:var(--dim);font-size:14px}

/* Pull-to-refresh */
#ptr-indicator{text-align:center;font-size:12px;color:var(--dim);flex-shrink:0;max-height:0;overflow:hidden;transition:max-height 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
#ptr-indicator.visible{max-height:40px}

/* Filter */
.filter-row{padding:0 16px 10px;flex-shrink:0}
.filter-row input{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-size:16px;padding:11px 14px;outline:none;-webkit-appearance:none;touch-action:manipulation}
.filter-row input:focus{border-color:var(--orange)}
.filter-row input::placeholder{color:var(--muted)}

/* Queue meta */
.q-meta{font-size:10px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:1px}

/* Queue action sheet */
#queue-sheet{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:400;display:flex;align-items:flex-end;pointer-events:none;transition:background 0.22s}
#queue-sheet.on{background:rgba(0,0,0,0.55);pointer-events:all}
.qs-inner{width:100%;padding:12px 12px calc(env(safe-area-inset-bottom,0px) + 12px);display:flex;flex-direction:column;gap:10px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
#queue-sheet.on .qs-inner{transform:translateY(0)}
.qs-title{font-size:12px;color:var(--dim);text-align:center;padding:0 16px 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.qs-btn{background:var(--s2);border:none;border-radius:16px;color:var(--text);font-size:17px;font-weight:600;padding:18px;cursor:pointer;text-align:center;width:100%}
.qs-btn:active{opacity:0.7}
.qs-btn.primary{color:var(--orange)}
.qs-cancel{background:var(--s1);border:none;border-radius:16px;color:var(--dim);font-size:17px;font-weight:600;padding:18px;cursor:pointer;text-align:center;width:100%}
.qs-cancel:active{opacity:0.7}

/* Toast */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--s2);border:1px solid var(--border);border-radius:22px;padding:10px 20px;font-size:13px;font-weight:700;color:var(--text);opacity:0;transition:opacity 0.18s,transform 0.18s;pointer-events:none;z-index:500;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Pod header (in episode view) */
#pod-header{display:none;padding:0 16px 10px;flex-shrink:0}
#pod-header.on{display:block}
.ph-row{display:flex;align-items:flex-start;gap:12px}
.ph-art{width:56px;height:56px;border-radius:12px;object-fit:cover;background:var(--s3);flex-shrink:0}
.ph-info{flex:1;min-width:0}
.ph-name{font-size:14px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ph-count{font-size:12px;color:var(--dim);margin-top:2px}
.ph-desc{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── Hover states (mouse / trackpad only) ───────────────────────────────── */
@media (hover: hover) {
  .lib-card:hover{background:var(--s2)}
  .q-item:hover:not(.now){background:var(--s2)}
  .wp-item:hover{background:var(--s2)}
  .ch-item:hover{background:rgba(255,255,255,0.04);border-radius:6px;margin:0 -4px;padding:9px 8px}
  .add-btn:hover:not(.in-queue){border-color:var(--orange)}
  .c-btn:hover{opacity:0.7}
  .c-play:hover{opacity:0.85}
  .skip-btn:hover{background:var(--s3)}
  .spd-btn:hover:not(.on){background:var(--s3);color:var(--text)}
  .wp-action:hover{opacity:0.8}
  .tab:hover{color:var(--text)}
  .art-dot{cursor:pointer}
  .back-btn:hover{opacity:0.7}
  .qs-btn:hover,.qs-cancel:hover{opacity:0.8}
  .eps-play:hover{opacity:0.85}
  .eps-q:hover{opacity:0.8}
  .sub-btn:hover{opacity:0.85}
  .q-drag{cursor:grab}
  .q-drag:active{cursor:grabbing}
  .carousel-btn:not(:disabled):hover{color:var(--orange);background:var(--s2)}
}

/* ── Desktop two-column layout ──────────────────────────────────────────── */
@media (min-width: 768px) {
  body{display:flex;flex-direction:row}
  #app{width:360px;min-width:360px;flex-shrink:0;border-right:1px solid var(--border);height:100vh}
  #full-player{position:static!important;display:flex!important;flex:1;height:100vh;transform:none!important;transition:none!important;border-radius:0!important;z-index:auto!important;will-change:auto!important;padding-top:20px}
  .drag-handle{display:none}
  #mini-player{display:none!important}
  #tab-bar{padding-bottom:12px}
  .art-wrap{width:min(260px,28vw);height:min(260px,28vw)}
  .carousel-btn{display:block}
  .scroll-area::-webkit-scrollbar{display:block;width:4px}
  .scroll-area::-webkit-scrollbar-track{background:transparent}
  .scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  #prog-track{cursor:ew-resize}
}

/* Episode detail sheet */
#ep-sheet{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:300;display:flex;align-items:flex-end;pointer-events:none;transition:background 0.22s}
#ep-sheet.on{background:rgba(0,0,0,0.6);pointer-events:all}
.eps-inner{width:100%;background:var(--s1);border-radius:24px 24px 0 0;max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1)}
#ep-sheet.on .eps-inner{transform:translateY(0)}
.eps-topbar{display:flex;align-items:center;justify-content:center;padding:14px 16px 6px;flex-shrink:0;position:relative}
.eps-drag{width:40px;height:5px;background:var(--border);border-radius:3px}
.eps-close{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:24px;padding:4px 8px;cursor:pointer;line-height:1}
.eps-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 8px}
.eps-hero{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start}
.eps-art{width:80px;height:80px;border-radius:14px;object-fit:cover;background:var(--s3);flex-shrink:0}
.eps-hero-info{flex:1;min-width:0}
.eps-title{font-size:16px;font-weight:800;line-height:1.3;margin-bottom:3px}
.eps-show{font-size:13px;color:var(--orange);margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.eps-meta-line{font-size:12px;color:var(--dim)}
.eps-desc{font-size:13px;color:var(--text);line-height:1.6;margin-top:12px;word-break:break-word;overflow-wrap:break-word}
.eps-actions{display:flex;gap:10px;padding:14px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 14px);flex-shrink:0}
.eps-play{flex:1;background:var(--gradient);border:none;border-radius:16px;color:#000;font-size:16px;font-weight:800;padding:18px;cursor:pointer}
.eps-play:active{opacity:0.8}
.eps-q{background:var(--s2);border:none;border-radius:16px;color:var(--orange);font-size:15px;font-weight:700;padding:18px 20px;cursor:pointer;white-space:nowrap}
.eps-q:active{opacity:0.7}
</style>
</head>
<body>
<div id="app">

  <!-- SEARCH VIEW -->
  <div id="v-search" class="view">
    <div class="vhead"><h1>Backtrack</h1></div>
    <div class="search-row">
      <input id="search-input" type="search" placeholder="Search podcasts…" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
      <button id="search-btn">Go</button>
    </div>
    <div class="scroll-area" id="search-results">
      <div class="empty"><div class="ico">🎙</div><p>Search for your favourite podcasts</p></div>
    </div>
  </div>

  <!-- LIBRARY VIEW -->
  <div id="v-library" class="view active">
    <div class="vhead"><h1>Library</h1></div>
    <div class="filter-row">
      <input id="lib-filter" type="text" inputmode="search" placeholder="Filter library…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="scroll-area" id="library-list"></div>
  </div>

  <!-- EPISODES VIEW -->
  <div id="v-episodes" class="view">
    <div class="vhead">
      <button class="back-btn" id="ep-back">‹</button>
      <h2 id="ep-show-name"></h2>
    </div>
    <div id="pod-header">
      <div class="ph-row">
        <img class="ph-art" id="ph-art" src="" alt="">
        <div class="ph-info">
          <div class="ph-name" id="ph-name"></div>
          <div class="ph-count" id="ph-count"></div>
          <button class="sub-btn" id="ph-sub-btn" onclick="toggleSubFromHeader()">Subscribe</button>
        </div>
      </div>
      <div class="ph-desc" id="ph-desc"></div>
    </div>
    <div class="filter-row">
      <input id="ep-filter" type="text" inputmode="search" placeholder="Filter episodes…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <div id="ptr-indicator">↓ Pull to refresh</div>
    <div class="scroll-area" id="ep-list"></div>
  </div>

  <!-- QUEUE VIEW -->
  <div id="v-queue" class="view">
    <div class="vhead">
      <h1>Queue</h1>
      <button class="vhead-action" id="queue-edit-btn" onclick="toggleQueueEdit()">Edit</button>
    </div>
    <div class="scroll-area" id="queue-list"></div>
    <div id="queue-edit-bar">
      <button class="qeb-btn qeb-remove" id="qeb-remove" disabled onclick="removeQueueSelected()">Remove</button>
      <button class="qeb-btn qeb-clear" onclick="clearQueue()">Clear All</button>
    </div>
  </div>

  <!-- WAYPOINTS VIEW -->
  <div id="v-waypoints" class="view">
    <div class="vhead"><h1>Waypoints</h1><button class="vhead-action" id="wp-clear-btn" onclick="clearAllWaypoints()" style="display:none">Clear All</button></div>
    <div class="scroll-area" id="wp-list"></div>
  </div>

  <!-- MINI PLAYER -->
  <div id="mini-player">
    <div class="mini-inner">
      <img id="mini-art" src="" alt="">
      <div class="mini-txt">
        <div id="mini-title">Nothing playing</div>
        <div id="mini-show"></div>
      </div>
      <div class="mini-btns">
        <button class="mini-btn" id="mini-back13" aria-label="Skip back 13 seconds">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
        <button class="mini-btn pp" id="mini-pp-btn" aria-label="Play">
          <svg id="mini-pp-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="mini-btn" id="mini-fwd13" aria-label="Skip forward 13 seconds">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
        </button>
      </div>
    </div>
    <div id="mini-prog-track"><div id="mini-prog-fill"></div></div>
  </div>

  <!-- TAB BAR -->
  <div id="tab-bar">
    <button class="tab on" data-v="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Library
    </button>
    <button class="tab" data-v="queue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Queue
    </button>
    <button class="tab" data-v="waypoints">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Waypoints
    </button>
    <button class="tab" data-v="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </button>
  </div>

</div><!-- #app -->

<!-- FULL PLAYER (overlay) -->
<div id="full-player">
  <div class="fp-topbar" id="fp-topbar">
    <div class="drag-handle" id="drag-handle"></div>
    <button class="fp-queue-btn" id="fp-queue-btn" title="Queue">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
  <div id="fp-inner">
  <div class="art-row">
    <button class="carousel-btn" id="carousel-prev" aria-label="Previous panel">‹</button>
    <div class="art-wrap">
      <div class="art-slider" id="art-slider">
        <div id="fp-chapters"></div>
        <img id="fp-art" src="" alt="" draggable="false">
        <div id="fp-notes"></div>
      </div>
    </div>
    <button class="carousel-btn" id="carousel-next" aria-label="Next panel">›</button>
  </div>
  <div class="art-dots">
    <span class="art-dot" id="art-dot-0" style="display:none"></span>
    <span class="art-dot on" id="art-dot-1"></span>
    <span class="art-dot" id="art-dot-2"></span>
  </div>
  <div id="fp-title">Episode Title</div>
  <div id="fp-show">Podcast Name</div>

  <div class="prog-wrap">
    <div id="prog-track"><div id="prog-fill"><div id="prog-thumb"></div></div></div>
    <div class="time-row"><span id="t-cur">0:00</span><span id="t-rem">-0:00</span></div>
  </div>

  <div class="speed-row">
    <button class="spd-btn" data-s="0.75">0.75×</button>
    <button class="spd-btn" data-s="1">1×</button>
    <button class="spd-btn" data-s="1.25">1.25×</button>
    <button class="spd-btn" data-s="1.5">1.5×</button>
    <button class="spd-btn" data-s="2">2×</button>

  <div class="main-ctrl">
    <button class="c-btn" id="fp-prev" aria-label="Previous track">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      <span>Prev</span>
    </button>
    <button class="skip-btn" id="fp-back30" aria-label="Skip back 30 seconds">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      <span>30s</span>
    </button>
    <button class="c-play" id="fp-pp" aria-label="Play">
      <svg id="fp-pp-icon" width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="skip-btn" id="fp-fwd30" aria-label="Skip forward 30 seconds">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
      <span>30s</span>
    </button>
    <button class="c-btn" id="fp-next" aria-label="Next track">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6v12zm9-12v12h2V6h-2z"/></svg>
      <span>Next</span>
    </button>
  </div>

  <div class="wp-row">
    <button class="wp-action" id="fp-mark-wp">⚑ Waypoint</button>
    <button class="wp-action" id="fp-sleep-btn">⏾ Sleep</button>
  </div>
  </div><!-- #fp-inner -->
</div>

<div id="queue-sheet">
  <div class="qs-inner">
    <div class="qs-title" id="qs-title"></div>
    <button class="qs-btn primary" id="qs-next">▶ Play Next</button>
    <button class="qs-btn" id="qs-end">+ Add to End</button>
    <button class="qs-cancel" id="qs-cancel">Cancel</button>
  </div>
</div>

<div id="ep-sheet">
  <div class="eps-inner">
    <div class="eps-topbar">
      <div class="eps-drag"></div>
      <button class="eps-close" id="eps-close">×</button>
    </div>
    <div class="eps-scroll">
      <div class="eps-hero">
        <img class="eps-art" id="eps-art" src="" alt="">
        <div class="eps-hero-info">
          <div class="eps-title" id="eps-title"></div>
          <div class="eps-show" id="eps-show"></div>
          <div class="eps-meta-line" id="eps-meta"></div>
        </div>
      </div>
      <div class="eps-desc" id="eps-desc"></div>
    </div>
    <div class="eps-actions">
      <button class="eps-play" id="eps-play">▶ Play</button>
      <button class="eps-q" id="eps-add-q">+ Queue</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<audio id="audio-el"></audio>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const STORE_KEY = 'backtrack_v1';
const DEF = {
  subs: [],          // [{id,name,art,feedUrl,desc}]
  lib: {},           // id -> episode[]
  queue: [],         // episode objects
  qi: 0,             // queue index
  pos: 0,            // current playback position (seconds)
  positions: {},     // episodeId -> saved position
  speed: 1,
  waypoints: [],     // [{id,label,epId,pos,epTitle,showName,ts}]
  listened: {},      // episodeId -> true (played past 80%)
  sessionStart: null // unused, kept for backwards compat
};

let S = load();
let audio = document.getElementById('audio-el');
let scrubbing = false;
const isDesktop = () => window.matchMedia('(min-width: 768px)').matches;
let currentView = 'library';
let episodePodcastId = null;
let browseCache = {};       // temp feed cache for unsubscribed shows (not persisted)
let currentBrowsePod = null; // { id, name, art, feedUrl, desc } for current episode view
let episodeSourceView = 'library'; // which tab to return to on back
let sheetEp = null;         // episode open in detail sheet
let lastSearchResults = []; // cache of last iTunes search results
let libSubView = 'list';    // 'list' | 'episodes' — last active library sub-view
let savedEpScrollTop = 0;   // ep-list scroll position across tab switches
let savedLibScrollTop = 0;  // library-list scroll position across tab switches

function load() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? {...DEF, ...JSON.parse(d)} : {...DEF}; }
  catch { return {...DEF}; }
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch {}
}

function getEps(podId) {
  return S.lib[podId] || browseCache[podId] || [];
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
const PAUSE_ICON = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

function ft(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const s = Math.floor(sec), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return h > 0 ? `${h}:${pad(m)}:${pad(ss)}` : `${m}:${pad(ss)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeHttpUrl(value) {
  try {
    const u = new URL(value, location.href);
    return (u.protocol === 'https:' || u.protocol === 'http:') ? u.href : '';
  } catch {
    return '';
  }
}

// Decode HTML entities from CDATA-wrapped fields (e.g. &#8217; → ')
function decodeEntities(s) {
  if (!s || !s.includes('&')) return s || '';
  const d = document.createElement('div');
  d.innerHTML = s;
  return d.textContent;
}

function feedText(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.innerHTML = s;
  let text = d.textContent || '';
  if (/<[a-z][\s\S]*>/i.test(text)) {
    d.innerHTML = text;
    text = d.textContent || '';
  }
  return text.replace(/\s+/g, ' ').trim();
}

// Fast non-cryptographic hash for stable episode IDs
function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
  return h.toString(36);
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function parseDur(s) {
  if (!s) return 0;
  const p = String(s).split(':').map(Number);
  if (p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  if (p.length === 2) return p[0]*60 + p[1];
  return parseInt(s)||0;
}

// ── Navigation ────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => nav(t.dataset.v));
});

function nav(view) {
  // Save scroll positions before leaving current view
  if (currentView === 'episodes') savedEpScrollTop = document.getElementById('ep-list').scrollTop;
  if (currentView === 'library') savedLibScrollTop = document.getElementById('library-list').scrollTop;

  // Library tab: restore last library sub-view instead of always going to list
  if (view === 'library') {
    // Already in library context and not explicitly navigating to list — nothing to do
    if (currentView === 'library' || (currentView === 'episodes' && episodeSourceView === 'library' && libSubView !== 'list')) return;
    // Restore episode view if that's where we left off in the library
    if (libSubView === 'episodes' && episodePodcastId !== null) {
      currentView = 'episodes';
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.v === 'library'));
      document.getElementById('v-episodes').classList.add('active');
      requestAnimationFrame(() => { document.getElementById('ep-list').scrollTop = savedEpScrollTop; });
      return;
    }
    // Otherwise show the library list and restore its scroll
    currentView = 'library';
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.v === 'library'));
    document.getElementById('v-library').classList.add('active');
    renderLibrary();
    requestAnimationFrame(() => { document.getElementById('library-list').scrollTop = savedLibScrollTop; });
    return;
  }

  if (view === currentView) return;
  if (currentView === 'queue' && queueEditMode) {
    queueEditMode = false;
    queueSelected.clear();
    document.getElementById('queue-edit-btn').textContent = 'Edit';
    document.getElementById('queue-edit-bar').classList.remove('visible');
  }
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.v === view));
  const map = { search: 'v-search', queue: 'v-queue', waypoints: 'v-waypoints' };
  document.getElementById(map[view])?.classList.add('active');
  if (view === 'queue') renderQueue();
  else if (view === 'waypoints') { renderWaypoints(); requestAnimationFrame(() => { const el = document.getElementById('wp-list'); if (el) el.scrollTop = el.scrollHeight; }); }
}

document.getElementById('ep-back').addEventListener('click', () => {
  // Explicit back always goes to the list, not restoring episode context
  libSubView = 'list';
  nav(episodeSourceView);
});
document.getElementById('lib-filter').addEventListener('input', () => renderLibrary());
document.getElementById('ep-filter').addEventListener('input', () => { if (episodePodcastId) renderEps(episodePodcastId); });

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('search-results').addEventListener('click', e => {
  const card = e.target.closest('.pod-card');
  if (!card) return;
  const collectionId = parseInt(card.dataset.collectionId, 10);
  if (e.target.closest('.sub-btn')) {
    const p = getSearchResult(collectionId);
    if (p) toggleSubFromSearchResult(p, e.target.closest('.sub-btn'));
    return;
  }
  openPodFromSearch(collectionId);
});

async function doSearch() {
  const q2 = document.getElementById('search-input').value.trim();
  if (!q2) return;
  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="loading-msg">Searching…</div>';
  try {
    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q2)}&media=podcast&limit=20&entity=podcast`);
    const d = await r.json();
    renderSearch(d.results || []);
  } catch {
    el.innerHTML = '<div class="empty"><p>Search failed. Check your connection.</p></div>';
  }
}

function renderSearch(results) {
  lastSearchResults = results;
  const el = document.getElementById('search-results');
  if (!results.length) { el.innerHTML = '<div class="empty"><p>No results found.</p></div>'; return; }
  el.innerHTML = results.map(p => {
    const subbed = S.subs.some(s => s.id === p.collectionId);
    return `<div class="pod-card" data-collection-id="${esc(p.collectionId)}" style="cursor:pointer">
      <img class="pod-art" src="${esc(p.artworkUrl100)}" alt="" loading="lazy">
      <div class="pod-info">
        <div class="pod-name">${esc(p.collectionName)}</div>
        <div class="pod-desc">${esc(p.artistName||'')}</div>
        <button class="sub-btn${subbed?' done':''}">
          ${subbed ? 'Subscribed' : '+ Subscribe'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function getSearchResult(collectionId) {
  return lastSearchResults.find(r => r.collectionId === collectionId);
}

function toggleSubFromSearchResult(p, btn) {
  toggleSub(p.collectionId, p.collectionName, p.artworkUrl600 || p.artworkUrl100 || '', p.feedUrl || '', p.artistName || '', btn);
}

function openPodFromSearch(collectionId) {
  const p = getSearchResult(collectionId);
  if (!p) return;
  showEpisodes(p.collectionId, {
    id: p.collectionId,
    name: p.collectionName,
    art: p.artworkUrl600 || p.artworkUrl100 || '',
    feedUrl: p.feedUrl || '',
    desc: p.artistName || '',
  });
}

function toggleSub(id, name, art, feedUrl, desc, btn) {
  const i = S.subs.findIndex(s => s.id === id);
  if (i > -1) {
    S.subs.splice(i, 1);
    delete S.lib[id];
    if (btn) { btn.textContent = '+ Subscribe'; btn.classList.remove('done'); }
    toast('Unsubscribed');
  } else {
    S.subs.push({ id, name, art, feedUrl, desc });
    // Promote browse cache to persisted lib if available
    if (browseCache[id]) { S.lib[id] = browseCache[id]; delete browseCache[id]; }
    else if (!S.lib[id]?.length) fetchFeed(id, feedUrl, { name, art });
    if (btn) { btn.textContent = 'Subscribed'; btn.classList.add('done'); }
    toast('Subscribed!');
  }
  save();
  renderLibrary();
  if (episodePodcastId === id) renderPodHeader(id);
}

// ── Library ───────────────────────────────────────────────────────────────────
function renderLibrary() {
  const el = document.getElementById('library-list');
  if (!S.subs.length) {
    el.innerHTML = '<div class="empty"><div class="ico">🎙</div><p>No subscriptions yet.<br>Search for podcasts to get started.</p></div>';
    return;
  }

async function proxyFetch(feedUrl) {
  // Try direct first — Megaphone and many hosts allow CORS
  try {
    const r = await fetch(feedUrl, { signal: AbortSignal.timeout(15000) });
    if (r.ok) return await r.text();
  } catch {}

  // Try proxies one at a time so private-ish feed URLs are not sprayed to every fallback.
  const proxies = [
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  ];

  async function tryProxy(makeUrl) {
    const r = await fetch(makeUrl(feedUrl), { signal: AbortSignal.timeout(20000) });
    if (!r.ok) throw new Error(`${r.status}`);
    const text = await r.text();
    if (text.startsWith('{') && text.includes('"contents"')) return JSON.parse(text).contents;
    if (!text.includes('<')) throw new Error('not xml');
    return text;
  }

  for (const proxy of proxies) {
    try { return await tryProxy(proxy); } catch {}
  }
  throw new Error('feed fetch failed');
}

async function fetchFeed(podId, feedUrl, podMeta = {}, persist = true) {
  if (!feedUrl) return;
  try {
    const text = await proxyFetch(feedUrl);
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    const pod = S.subs.find(s => s.id === podId) || podMeta;
    const itns = 'http://www.itunes.com/dtds/podcast-1.0.dtd';
    // Parse channel-level description for the pod header
    const ch = xml.querySelector('channel');
    if (ch && currentBrowsePod?.id === podId) {
      const rawChDesc = (ch.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/','encoded')[0]
        || ch.getElementsByTagNameNS(itns,'summary')[0]
        || Array.from(ch.children).find(n => n.localName === 'description'))?.textContent?.trim() || '';
      const chDesc = feedText(rawChDesc);
      if (chDesc) document.getElementById('ph-desc').textContent = chDesc;
    }
    const items = xml.querySelectorAll('item');
    const eps = Array.from(items).map((item, i) => {
      const enc = item.querySelector('enclosure');
      const audioUrl = enc?.getAttribute('url') || '';
      if (!audioUrl) return null;
      const itunesImg = item.getElementsByTagNameNS(itns, 'image')[0];
      const art = itunesImg?.getAttribute('href') || pod?.art || '';
      const dur = item.getElementsByTagNameNS(itns, 'duration')[0]?.textContent ||
                  item.querySelector('duration')?.textContent || '';
      const pub = item.querySelector('pubDate')?.textContent || '';
      const epNum = item.getElementsByTagNameNS(itns, 'episode')[0]?.textContent?.trim() || '';
      const rawDesc = (item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/','encoded')[0] || item.getElementsByTagNameNS(itns,'summary')[0] || item.querySelector('description'))?.textContent?.trim() || '';
      const desc = feedText(rawDesc);
      const chaptersNode = item.getElementsByTagNameNS('https://podcastindex.org/namespace/1.0','chapters')[0]
        || Array.from(item.getElementsByTagName('*')).find(n => n.localName === 'chapters' && n.hasAttribute('url'));
      const chaptersUrl = chaptersNode?.getAttribute('url') || '';
      const rawTitle = item.querySelector('title')?.textContent?.trim() || '';
      const title = decodeEntities(rawTitle) || `Episode ${i+1}`;
      // Stable ID: guid → enclosure URL → title+pubDate hash (position-based IDs break after feed refresh)
      const guid = item.querySelector('guid')?.textContent?.trim() || '';
      const stableKey = guid || audioUrl || (rawTitle + pub);
      const id = `${podId}_${hashStr(stableKey)}`;
      return {
        id,
        podId,
        podName: pod?.name || '',
        art,
        title,
        audioUrl,
        dur: parseDur(dur.trim()),
        date: pub ? new Date(pub).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '',
        epNum,
        desc,
        chaptersUrl,
      };
    }).filter(Boolean);
    if (persist) { S.lib[podId] = eps; save(); }
    else { browseCache[podId] = eps; }
    // Update episode count in header now that we have data
    if (currentBrowsePod?.id === podId) {
      document.getElementById('ph-count').textContent = `${eps.length} episodes`;
    }
    // Re-trigger chapters for the playing episode when feed is refreshed externally
    const curEp = S.queue[S.qi];
    if (curEp?.podId === podId && !chaptersLoading) {
      const freshEp = eps.find(e => e.id === curEp.id);
      if (freshEp) { chaptersEpId = null; loadChapters(freshEp); }
    }
  } catch(e) {
    console.error('Feed error', e);
    document.getElementById('ep-list').innerHTML = '<div class="empty"><p>Couldn\'t load episodes. Check your connection and try again.</p></div>';
  }
}

let epCurrentEps = [], epAllEps = [], epRenderBatch = 0, epObserver = null;
const EP_BATCH = 30;

function renderEps(podId) {
  const allEps = getEps(podId);
  const el = document.getElementById('ep-list');
  if (!allEps.length) { el.innerHTML = '<div class="empty"><p>No episodes found.</p></div>'; return; }
  const fq = document.getElementById('ep-filter').value.trim().toLowerCase();
  const eps = fq ? allEps.filter(ep => ep.title.toLowerCase().includes(fq)) : allEps;
  if (!eps.length) { el.innerHTML = '<div class="empty"><p>No matches.</p></div>'; return; }
  if (epObserver) { epObserver.disconnect(); epObserver = null; }
  epAllEps = allEps;
  epCurrentEps = eps;
  epRenderBatch = 0;
  el.innerHTML = '';
  appendEpBatch();
}

function appendEpBatch() {
  const el = document.getElementById('ep-list');
  const start = epRenderBatch * EP_BATCH;
  const end = Math.min(start + EP_BATCH, epCurrentEps.length);
  if (start >= epCurrentEps.length) return;
  const sentinel = document.getElementById('ep-sentinel');
  if (sentinel) sentinel.remove();
  el.insertAdjacentHTML('beforeend', epCurrentEps.slice(start, end).map(ep => {
    const i = epAllEps.indexOf(ep);
    const inQ = S.queue.some(q => q.id === ep.id);
    const heard = !!S.listened[ep.id];
    return `<div class="ep-item" onclick="tapEpisode(${ep.podId},${i},event)">
      <img class="ep-art" src="${esc(ep.art)}" alt="" loading="lazy">
      <div class="ep-info">
        <div class="ep-title">${esc(ep.title)}</div>
        <div class="ep-meta">${esc(ep.date)}${ep.dur ? ' · '+ft(ep.dur) : ''}${heard ? ' · <span class="ep-listened">✓ listened</span>' : ''}</div>
      </div>
      <button id="add-${ep.id}" class="add-btn${inQ?' in-queue':''}" onclick="addToQueue(${ep.podId},${i},event)" title="${inQ?'In queue':'Add to queue'}">${inQ?'✓':'+'}</button>
    </div>`;
  }).join(''));
  epRenderBatch++;
  if (end < epCurrentEps.length) {
    const s = document.createElement('div');
    s.id = 'ep-sentinel';
    s.style.height = '1px';
    el.appendChild(s);
    epObserver = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      epObserver.disconnect(); epObserver = null;
      appendEpBatch();
    }, { root: el, rootMargin: '300px' });
    epObserver.observe(s);
  }
}

function refreshEpAddBtn(ep) {

// Central queue removal — all removal paths funnel through here
function removeQueueAt(i, opts = {}) {
  if (i < 0 || i >= S.queue.length) return;
  const ep = S.queue[i];
  const wasCurrent = i === S.qi;
  purgeWaypoints(new Set([ep.id]));
  if (wasCurrent) { audio.pause(); audio.src = ''; }
  S.queue.splice(i, 1);
  if (i < S.qi) S.qi--;
  if (S.qi >= S.queue.length) S.qi = Math.max(0, S.queue.length - 1);
  if (wasCurrent && S.queue.length) {
    const nextEp = S.queue[S.qi];
    S.pos = (nextEp && S.positions[nextEp.id]) || 0;
  }
  save();
  updateMini();
  if (opts.refreshBtn) refreshEpAddBtn(ep);
  if (!S.queue.length) { document.getElementById('full-player').classList.remove('on'); }
  else if (wasCurrent) { updateFP(); if (opts.resumePlay) loadTrack(true); }
  if (opts.toast) toast('Removed from queue');
}

function removeFromQueue(ep) {
  const i = S.queue.findIndex(q => q.id === ep.id);
  if (i === -1) return;
  removeQueueAt(i, { refreshBtn: true, toast: true });
}

function addToQueue(podId, epIdx, e) {
  if (e) e.stopPropagation();
  const ep = getEps(podId)[epIdx];
  if (!ep) return;
  if (S.queue.some(q => q.id === ep.id)) { removeFromQueue(ep); return; }
  showQueueSheet(ep);
}

// ── Queue ─────────────────────────────────────────────────────────────────────
let queueEditMode = false;
let queueSelected = new Set();

function renderQueueIfVisible() {

function toggleQueueEdit() {
  queueEditMode = !queueEditMode;
  if (!queueEditMode) queueSelected.clear();
  document.getElementById('queue-edit-btn').textContent = queueEditMode ? 'Done' : 'Edit';
  const bar = document.getElementById('queue-edit-bar');
  bar.classList.toggle('visible', queueEditMode);

function toggleQueueSelect(i) {
  if (queueSelected.has(i)) queueSelected.delete(i);
  else queueSelected.add(i);
  const n = queueSelected.size;
  const btn = document.getElementById('qeb-remove');
  btn.textContent = n ? `Remove (${n})` : 'Remove';
  btn.disabled = n === 0;
  const item = document.querySelector(`#queue-list .q-item[data-qi="${i}"]`);
  if (item) item.classList.toggle('q-sel', queueSelected.has(i));
}

function removeQueueSelected() {
  // Remove highest indices first so lower indices stay valid
  const indices = Array.from(queueSelected).sort((a, b) => b - a);
  for (const i of indices) removeQueueAt(i);
  queueSelected.clear();
  if (!S.queue.length) {
    queueEditMode = false;
    document.getElementById('queue-edit-btn').textContent = 'Edit';
    document.getElementById('queue-edit-bar').classList.remove('visible');
  }
  renderQueue();
}

function clearQueue() {
  audio.pause();
  audio.src = '';
  S.waypoints = [];
  S.queue = [];
  S.qi = 0;
  save();
  queueSelected.clear();
  queueEditMode = false;
  document.getElementById('queue-edit-btn').textContent = 'Edit';
  document.getElementById('queue-edit-bar').classList.remove('visible');
  renderQueue();
  updateMini();
}

function renderQueue() {
  const el = document.getElementById('queue-list');
  const editBtn = document.getElementById('queue-edit-btn');
  if (!S.queue.length) {
    el.innerHTML = '<div class="empty"><div class="ico">🎵</div><p>Queue is empty.<br>Browse episodes to add them.</p></div>';
    if (editBtn) editBtn.style.display = 'none';
    return;
  }
  if (editBtn) editBtn.style.display = '';
  el.innerHTML = S.queue.map((ep, i) => {
    const meta = [ep.epNum ? `Ep ${ep.epNum}` : '', ep.date].filter(Boolean).join(' · ');
    const sel = queueEditMode && queueSelected.has(i);
    return `
    <div class="q-item${i===S.qi&&!queueEditMode?' now':''}${sel?' q-sel':''}" data-qi="${i}" onclick="${queueEditMode ? `toggleQueueSelect(${i})` : `playAt(${i},event)`}">
      ${queueEditMode
        ? `<div class="q-check">${sel ? '✓' : ''}</div>`
        : `<div class="q-num">${i===S.qi ? '▶' : i+1}</div>`}
      <img class="q-art" src="${esc(ep.art)}" alt="" loading="lazy">
      <div class="q-info">
        <div class="q-title">${esc(ep.title)}</div>
        <div class="q-show">${esc(ep.podName)}</div>
        ${meta ? `<div class="q-meta">${esc(meta)}</div>` : ''}
      </div>
      ${queueEditMode ? '' : `<button class="q-drag" aria-label="Reorder">⠿</button><button class="q-del" onclick="delFromQueue(event,${i})">×</button>`}
    </div>`;
  }).join('');
}

function purgeWaypoints(epIds) {
  S.waypoints = S.waypoints.filter(w => !epIds.has(w.epId));
}

function delFromQueue(ev, i) {
  ev.stopPropagation();
  const wasPlaying = !audio.paused;
  removeQueueAt(i, { resumePlay: wasPlaying });
  renderQueue();
}

let qDragJustEnded = false;
function playAt(i, e) {

  if (e && e.target.closest('.q-drag')) return;

}

// ── Queue drag-to-reorder ─────────────────────────────────────────────────────
let qd = null;
const qList = document.getElementById('queue-list');

qList.addEventListener('touchstart', e => {
  const handle = e.target.closest('.q-drag');
  if (!handle) return;
  const item = handle.closest('.q-item');
  if (!item) return;
  const idx = +item.dataset.qi;
  const rect = item.getBoundingClientRect();

  // Floating ghost follows finger
  const ghost = item.cloneNode(true);
  Object.assign(ghost.style, {
    position:'fixed', top:rect.top+'px', left:rect.left+'px',
    width:rect.width+'px', zIndex:'999', opacity:'0.95',
    pointerEvents:'none', border:'1.5px solid var(--orange)',
    boxShadow:'0 8px 32px rgba(0,0,0,0.6)', borderRadius:'18px',
    transform:'scale(1.03)', background:'var(--s3)', margin:'0',
  });
  document.body.appendChild(ghost);

  // Placeholder slot: same height as item, shows the drop target
  const ph = document.createElement('div');
  ph.style.cssText = `height:${rect.height}px;border:2px dashed var(--orange);border-radius:18px;margin-bottom:8px;background:rgba(249,166,32,0.07);flex-shrink:0;box-sizing:border-box;`;

  // Collapse the original item in place
  item.style.cssText = 'height:0;overflow:hidden;margin:0;padding:0;';
  item.after(ph);

  qd = { idx, targetIdx: idx, item, ghost, ph, offsetY: e.touches[0].clientY - rect.top };
}, { passive: true });

qList.addEventListener('touchmove', e => {
  if (!qd) return;
  const y = e.touches[0].clientY;
  qd.ghost.style.top = (y - qd.offsetY) + 'px';

  // Only measure real items (exclude the collapsed dragged item)
  const items = Array.from(document.querySelectorAll('#queue-list .q-item')).filter(el => el !== qd.item);
  let target = 0;
  items.forEach((el, i) => {
    const r = el.getBoundingClientRect();
    if (y > r.top + r.height / 2) target = i + 1;
  });
  const newTarget = Math.min(Math.max(0, target), items.length);

  if (newTarget !== qd.targetIdx) {
    qd.targetIdx = newTarget;
    if (newTarget >= items.length) {
      items[items.length - 1]?.after(qd.ph);
    } else {
      items[newTarget].before(qd.ph);
    }
  }
}, { passive: true });

function finishQDrag() {
  if (!qd) return;
  qd.ghost.remove();
  qd.ph.remove();
  qd.item.style.cssText = '';

  const from = qd.idx;
  const to = qd.targetIdx; // index in filtered (N-1) array = final insert position after splice

  if (to !== from) {
    const [moved] = S.queue.splice(from, 1);
    S.queue.splice(to, 0, moved);
    if (S.qi === from) S.qi = to;
    else if (from < to && S.qi > from && S.qi <= to) S.qi--;
    else if (from > to && S.qi >= to && S.qi < from) S.qi++;
    save();
    qDragJustEnded = true;
    setTimeout(() => { qDragJustEnded = false; }, 300);
  }
  renderQueue();
  qd = null;
}
qList.addEventListener('touchend', finishQDrag, { passive: true });

// Queue drag via mouse (pointer events, skip touch)
qList.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return;
  const handle = e.target.closest('.q-drag');
  if (!handle) return;
  e.preventDefault();
  const item = handle.closest('.q-item');
  if (!item) return;
  const idx = +item.dataset.qi;
  const rect = item.getBoundingClientRect();
  const ghost = item.cloneNode(true);
  Object.assign(ghost.style, {
    position:'fixed', top:rect.top+'px', left:rect.left+'px',
    width:rect.width+'px', zIndex:'999', opacity:'0.95',
    pointerEvents:'none', border:'1.5px solid var(--orange)',
    boxShadow:'0 8px 32px rgba(0,0,0,0.6)', borderRadius:'18px',
    transform:'scale(1.03)', background:'var(--s3)', margin:'0',
  });
  document.body.appendChild(ghost);
  const ph = document.createElement('div');
  ph.style.cssText = `height:${rect.height}px;border:2px dashed var(--orange);border-radius:18px;margin-bottom:8px;background:rgba(249,166,32,0.07);flex-shrink:0;box-sizing:border-box;`;
  item.style.cssText = 'height:0;overflow:hidden;margin:0;padding:0;';
  item.after(ph);
  qd = { idx, targetIdx: idx, item, ghost, ph, offsetY: e.clientY - rect.top };
  function onMove(ev) {
    if (!qd) return;
    const y = ev.clientY;
    qd.ghost.style.top = (y - qd.offsetY) + 'px';
    const items = Array.from(document.querySelectorAll('#queue-list .q-item')).filter(el => el !== qd.item);
    let target = 0;
    items.forEach((el, i) => { if (y > el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2) target = i + 1; });
    const newTarget = Math.min(Math.max(0, target), items.length);
    if (newTarget !== qd.targetIdx) {
      qd.targetIdx = newTarget;
      if (newTarget >= items.length) items[items.length-1]?.after(qd.ph);
      else items[newTarget].before(qd.ph);
    }
  }
  function onUp() { finishQDrag(); document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
});

  vEp.style.transform = `translateX(${Math.max(0, dx)}px)`;
  const dt = Date.now() - epSwipe.lastT;
  epSwipe.vel = dt > 0 ? (e.touches[0].clientX - epSwipe.lastX) / dt : 0;

function loadTrack(play = false) {
  const ep = S.queue[S.qi];
  if (!ep) return;
  audio.src = ep.audioUrl;
  audio.playbackRate = S.speed;
  if (S.pos > 0) {
    const seek = S.pos;
    audio.addEventListener('loadedmetadata', function h() {
      audio.currentTime = seek;
      audio.removeEventListener('loadedmetadata', h);
    });
  }
  if (play) audio.play().catch(()=>{});
  updateFP();
  updateMini();
  updateMediaSession();
  renderQueueIfVisible();
}

function updateMediaSession() {
  if (!('mediaSession' in navigator)) return;
  const ep = S.queue[S.qi];
  if (!ep) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: ep.title,
    artist: ep.podName,
    album: ep.podName,
    artwork: ep.art ? [{ src: ep.art, sizes: '512x512', type: 'image/jpeg' }] : [],
  });
  // Let iOS drive play/pause on the <audio> element natively — setting JS handlers
  // blocks iOS's own resume and causes it to silently fail. Only override seek/track.
  navigator.mediaSession.setActionHandler('play', null);
  navigator.mediaSession.setActionHandler('pause', null);
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
  navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime = Math.max(0, audio.currentTime - 30); });
  navigator.mediaSession.setActionHandler('seekforward', () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 30); });
}

audio.addEventListener('durationchange', () => {
  if (!('mediaSession' in navigator) || !audio.duration) return;
  try {
    navigator.mediaSession.setPositionState({ duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime });
  } catch {}
});

function togglePlay() {
  if (!S.queue.length) return;
  if (!audio.src || audio.src === location.href) { loadTrack(true); return; }
  if (audio.paused) {
    audio.play().catch(()=>{});
  } else {
    audio.pause();
  }
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (S.qi > 0) {
    S.qi--;
    const ep = S.queue[S.qi];
    S.pos = (ep && S.positions[ep.id]) || 0;
    loadTrack(!audio.paused);
    save();
  }
}
function nextTrack() {
  if (S.qi < S.queue.length - 1) {
    S.qi++;
    const ep = S.queue[S.qi];
    S.pos = (ep && S.positions[ep.id]) || 0;
    loadTrack(!audio.paused);
    save();
  }
}

let lastSavedBucket = -1;
audio.addEventListener('timeupdate', () => {
  if (scrubbing) return;
  S.pos = audio.currentTime;
  updateProgress();
  updateChapterHighlight();
  const ep = S.queue[S.qi];
  if (ep) {
    S.positions[ep.id] = audio.currentTime;
    if (!S.listened[ep.id] && audio.duration && audio.currentTime / audio.duration >= 0.8) {
      S.listened[ep.id] = true;
      save();
      lastSavedBucket = Math.floor(audio.currentTime / 5);
      return;
    }
  }
  const bucket = Math.floor(audio.currentTime / 5);
  if (bucket !== lastSavedBucket) { lastSavedBucket = bucket; save(); }
});
